<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="36" font-family="monospace" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Inventory Phase 3 — Categories CRUD</text>
  
  <!-- SvelteKit Routes box -->
  <rect x="40" y="60" width="200" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="82" font-family="monospace" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">SvelteKit Routes</text>
  <text x="140" y="102" font-family="monospace" font-size="11" fill="#1e40af" text-anchor="middle">/api/categories</text>
  <text x="140" y="118" font-family="monospace" font-size="11" fill="#1e40af" text-anchor="middle">/api/categories/[id]</text>
  <text x="140" y="134" font-family="monospace" font-size="11" fill="#1e40af" text-anchor="middle">/categories (page)</text>
  <text x="140" y="150" font-family="monospace" font-size="11" fill="#1e40af" text-anchor="middle">GET POST PUT DELETE</text>
  <text x="140" y="170" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">+server.ts</text>
  
  <!-- Arrow SvelteKit -> D1 -->
  <line x1="240" y1="120" x2="310" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="275" y="112" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">D1 SQL</text>
  
  <!-- Cloudflare D1 box -->
  <rect x="310" y="70" width="180" height="100" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="94" font-family="monospace" font-size="13" font-weight="bold" fill="#065f46" text-anchor="middle">Cloudflare D1</text>
  <text x="400" y="114" font-family="monospace" font-size="11" fill="#065f46" text-anchor="middle">categories table</text>
  <text x="400" y="130" font-family="monospace" font-size="10" fill="#065f46" text-anchor="middle">id, name, color, icon</text>
  <text x="400" y="146" font-family="monospace" font-size="10" fill="#065f46" text-anchor="middle">household_group_id</text>
  <text x="400" y="162" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">prepared statements</text>
  
  <!-- Arrow D1 -> Phase 4 -->
  <line x1="490" y1="120" x2="560" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="525" y="112" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">FK ref</text>
  
  <!-- Phase 4 preview box -->
  <rect x="560" y="75" width="190" height="90" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="655" y="97" font-family="monospace" font-size="13" font-weight="bold" fill="#713f12" text-anchor="middle">Phase 4 (next)</text>
  <text x="655" y="117" font-family="monospace" font-size="11" fill="#713f12" text-anchor="middle">Items CRUD</text>
  <text x="655" y="133" font-family="monospace" font-size="11" fill="#713f12" text-anchor="middle">item.category_id</text>
  <text x="655" y="153" font-family="monospace" font-size="10" fill="#eab308" text-anchor="middle">MIK-22</text>
  
  <!-- Tests box -->
  <rect x="40" y="220" width="200" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="140" y="244" font-family="monospace" font-size="13" font-weight="bold" fill="#4c1d95" text-anchor="middle">Vitest Tests</text>
  <text x="140" y="264" font-family="monospace" font-size="12" fill="#4c1d95" text-anchor="middle">73 test cases</text>
  <text x="140" y="282" font-family="monospace" font-size="10" fill="#7c3aed" text-anchor="middle">CRUD + edge cases (404, empty, long)</text>
  
  <!-- Design docs box -->
  <rect x="310" y="210" width="180" height="90" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="400" y="234" font-family="monospace" font-size="13" font-weight="bold" fill="#831843" text-anchor="middle">Design Docs</text>
  <text x="400" y="252" font-family="monospace" font-size="10" fill="#831843" text-anchor="middle">add-item-form-ui.excalidraw</text>
  <text x="400" y="268" font-family="monospace" font-size="10" fill="#831843" text-anchor="middle">dashboard-ui.excalidraw</text>
  <text x="400" y="284" font-family="monospace" font-size="10" fill="#831843" text-anchor="middle">items-list-ui.excalidraw</text>
  <text x="400" y="300" font-family="monospace" font-size="10" fill="#db2777" text-anchor="middle">user-flow.excalidraw</text>
  
  <!-- PR badge -->
  <rect x="560" y="215" width="190" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="655" y="238" font-family="monospace" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">PR #10 ✓ merged</text>
  <text x="655" y="258" font-family="monospace" font-size="11" fill="#334155" text-anchor="middle">miksin/inventory</text>
  <text x="655" y="278" font-family="monospace" font-size="11" fill="#334155" text-anchor="middle">MIK-21 → Done</text>
  
  <!-- Bottom note -->
  <text x="400" y="370" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">PR #8 (README + wrangler.toml) has merge conflict — pending rebase</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
