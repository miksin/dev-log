<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#1a1a2e"/>
  <!-- Tetris block shapes in background -->
  <rect x="60" y="60" width="40" height="40" rx="4" fill="#e94560" opacity="0.7"/>
  <rect x="100" y="60" width="40" height="40" rx="4" fill="#e94560" opacity="0.7"/>
  <rect x="100" y="100" width="40" height="40" rx="4" fill="#e94560" opacity="0.7"/>
  <rect x="140" y="100" width="40" height="40" rx="4" fill="#e94560" opacity="0.7"/>
  <!-- L-shape -->
  <rect x="200" y="100" width="40" height="40" rx="4" fill="#0f3460" opacity="0.9"/>
  <rect x="200" y="140" width="40" height="40" rx="4" fill="#0f3460" opacity="0.9"/>
  <rect x="200" y="180" width="40" height="40" rx="4" fill="#0f3460" opacity="0.9"/>
  <rect x="240" y="180" width="40" height="40" rx="4" fill="#0f3460" opacity="0.9"/>
  <!-- I-beam -->
  <rect x="620" y="80" width="40" height="160" rx="4" fill="#16213e" opacity="0.9"/>
  <rect x="660" y="80" width="40" height="160" rx="4" fill="#0f3460" opacity="0.9"/>
  <!-- Title area -->
  <rect x="280" y="80" width="360" height="260" rx="12" fill="#16213e" opacity="0.95"/>
  <!-- Checkmark circle -->
  <circle cx="460" cy="160" r="40" fill="#4caf50" opacity="0.9"/>
  <text x="460" y="172" text-anchor="middle" font-size="40" fill="white">✓</text>
  <!-- Title text -->
  <text x="460" y="240" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#e2e8f0">gameStore Tests</text>
  <text x="460" y="268" text-anchor="middle" font-family="monospace" font-size="14" fill="#94a3b8">tetris — 9 tests passing</text>
  <text x="460" y="296" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">Vitest + SvelteKit</text>
  <!-- Bottom accent line -->
  <rect x="360" y="320" width="200" height="3" rx="2" fill="#e94560" opacity="0.8"/>
</svg>
